<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquesta intel·ligent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenidor">
    <section class="graella-principal">
      <form class="targeta formulari" id="formulariEnquesta">
        <h1>Formulari d'enquesta</h1>

        <label for="grup">Grup</label>
        <select id="grup" name="grup">
          <option>DAW1A</option>
          <option>DAW1B</option>
          <option>ASIX1</option>
        </select>

        <label for="puntuacio">Satisfacció global (1-5)</label>
        <input id="puntuacio" name="puntuacio" type="number" min="1" max="5" step="1">

        <label for="comentari">Comentari (opcional)</label>
        <textarea id="comentari" name="comentari" rows="5"></textarea>

        <button type="submit">Guardar resposta</button>
        <p class="missatge" id="missatgeFormulari"></p>
      </form>

      <section class="targeta panell">
        <h2>Panell d'analítica</h2>

        <label for="filtreGrup">Filtre del panell</label>
        <select id="filtreGrup" name="filtreGrup">
          <option>TOTS</option>
          <option>DAW1A</option>
          <option>DAW1B</option>
          <option>ASIX1</option>
        </select>

        <p class="nota" id="notaPanell">Mostrant totes les dades.</p>

        <div class="kpis">
          <article class="kpi">
            <span>Respostes</span>
            <strong id="kpiRespostes"></strong>
          </article>
          <article class="kpi">
            <span>Mitjana</span>
            <strong id="kpiMitjana"></strong>
          </article>
          <article class="kpi">
            <span>% 4 o 5</span>
            <strong id="kpiPositives"></strong>
          </article>
          <article class="kpi">
            <span>Grup analitzat</span>
            <strong id="kpiGrup"></strong>
          </article>
        </div>

        <section class="bloc">
          <h3>Gràfica</h3>
          <div class="grafica" id="graficaPuntuacions"></div>
        </section>

        <section class="bloc">
          <h3>Llistat</h3>
          <div class="llista-respostes" id="llistaRespostes"></div>
        </section>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
